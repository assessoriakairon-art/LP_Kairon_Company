server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ------------------------------------------------------------------
    # Compressão (gzip) — reduz drasticamente o peso de CSS/JS/HTML
    # enviados ao navegador e acelera a primeira renderização.
    # ------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        application/x-font-ttf
        font/ttf
        font/otf
        font/woff
        font/woff2;

    # ------------------------------------------------------------------
    # Cache
    # ------------------------------------------------------------------

    # HTML nunca fica em cache longo: garante que cada deploy
    # seja visto imediatamente pelos visitantes.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # CSS e JS: cache de 7 dias (com public) — bom para visitantes
    # recorrentes, e mudanças propagam em poucos dias.
    location ~* \.(css|js)$ {
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Imagens e fontes raramente mudam: cache longo.
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
